<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>하루습관</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{
  font-family:'Noto Sans KR',system-ui,-apple-system,sans-serif;
  min-height:100vh;min-height:100dvh;
  background:#f5f3ee;color:#3a2e26;
  overscroll-behavior:none;-webkit-font-smoothing:antialiased;
}

/* ── 헤더 ── */
.app-header{
  width:100%;
  padding:max(env(safe-area-inset-top),10px) 16px 10px;
  background:#fff;
  display:flex;align-items:center;gap:10px;
  box-shadow:0 1px 8px rgba(0,0,0,.06);
  position:sticky;top:0;z-index:50;
}
.app-title{font-size:1.1rem;font-weight:800;letter-spacing:-.02em;flex-shrink:0}
.child-selector{
  display:flex;gap:6px;flex:1;overflow-x:auto;
  scrollbar-width:none;-webkit-overflow-scrolling:touch;
}
.child-selector::-webkit-scrollbar{display:none}
.child-chip{
  flex-shrink:0;padding:7px 14px;border-radius:20px;
  border:2px solid #e0d5c8;background:#fff;
  cursor:pointer;font-size:.8rem;font-weight:600;
  transition:all .15s;white-space:nowrap;min-height:36px;
  display:flex;align-items:center;gap:4px;
}
.child-chip:active{transform:scale(.96)}
.child-chip.active{
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:#fff;border-color:transparent;
  box-shadow:0 2px 10px rgba(102,126,234,.3);
}
.btn-add-chip{
  flex-shrink:0;width:36px;height:36px;border-radius:50%;
  border:2px dashed #ccc;background:transparent;
  cursor:pointer;font-size:1.1rem;color:#aaa;
  display:flex;align-items:center;justify-content:center;
}
.btn-add-chip:active{border-color:#667eea;color:#667eea}
.header-actions{display:flex;gap:6px;flex-shrink:0}
.btn-icon{
  width:36px;height:36px;border:none;background:#f0ebe4;
  border-radius:50%;cursor:pointer;font-size:.9rem;
  display:flex;align-items:center;justify-content:center;color:#888;
}
.btn-icon:active{background:#e0d5c8;transform:scale(.92)}

/* ── 2열 레이아웃 ── */
.layout{
  display:flex;gap:16px;
  width:100%;max-width:1100px;margin:0 auto;
  padding:12px 16px max(env(safe-area-inset-bottom),16px);
  min-height:calc(100vh - 60px);min-height:calc(100dvh - 60px);
}
.col-calendar{flex-shrink:0;width:300px}
.col-tasks{flex:1;min-width:0}

/* ── 캘린더 ── */
.calendar{
  background:#fff;border-radius:16px;
  padding:16px;border:1.5px solid #f0ebe4;
}
.cal-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;
}
.cal-title{font-size:1rem;font-weight:800}
.cal-nav{
  display:flex;gap:4px;
}
.cal-nav button{
  width:32px;height:32px;border:1.5px solid #e0d5c8;background:#fff;
  border-radius:50%;cursor:pointer;font-size:.85rem;color:#888;
  display:flex;align-items:center;justify-content:center;font-family:inherit;
}
.cal-nav button:active{background:#f0ebe4;transform:scale(.92)}
.cal-weekdays{
  display:grid;grid-template-columns:repeat(7,1fr);
  text-align:center;margin-bottom:6px;
}
.cal-weekdays span{font-size:.7rem;color:#aaa;font-weight:700;padding:4px 0}
.cal-weekdays span:first-child{color:#e44}
.cal-weekdays span:last-child{color:#4488ee}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-day{
  aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  font-size:.82rem;font-weight:600;border-radius:50%;
  cursor:pointer;transition:all .12s;position:relative;color:#555;
}
.cal-day:active{transform:scale(.9)}
.cal-day.other-month{color:#ddd;cursor:default}
.cal-day.today{border:2px solid #667eea;color:#667eea;font-weight:800}
.cal-day.selected{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-color:transparent}
.cal-day.has-done::after{
  content:'';width:5px;height:5px;border-radius:50%;
  background:#00b06f;position:absolute;bottom:2px;left:50%;transform:translateX(-50%);
}
.cal-day.all-done::after{background:#00b06f;width:6px;height:6px}
.cal-day.selected.has-done::after,.cal-day.selected.all-done::after{background:#fff}
.cal-day.sun{color:#e44}.cal-day.sat{color:#4488ee}
.cal-day.selected.sun,.cal-day.selected.sat{color:#fff}
.cal-day.future{color:#ddd;cursor:default;pointer-events:none}

/* ── 요약 카드 (캘린더 아래) ── */
.cal-summary{
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px;
}
.s-card.total .num{color:#e8855a}
.s-card{
  padding:10px;border-radius:12px;background:#f9f8f5;text-align:center;
}
.s-card .num{font-size:1.2rem;font-weight:800}
.s-card .lbl{font-size:.65rem;color:#999;font-weight:600;margin-top:1px}
.s-card.done .num{color:#00b06f}
.s-card.time .num{color:#667eea}

/* 게임사용권 버튼 */
.btn-tickets{
  width:100%;margin-top:12px;padding:12px;border-radius:14px;border:none;
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:#fff;font-size:.88rem;font-weight:700;
  cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;
}
.btn-tickets:active{transform:scale(.97)}
.btn-tickets .badge{
  background:rgba(255,255,255,.3);padding:2px 8px;border-radius:8px;
  font-size:.72rem;font-weight:800;
}

/* ── 할일 섹션 ── */
.tasks-panel{
  background:#fff;border-radius:16px;
  padding:18px;border:1.5px solid #f0ebe4;
  min-height:300px;
}
.tasks-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;
}
.tasks-title{font-size:1rem;font-weight:800;display:flex;align-items:center;gap:6px}
.btn-manage{
  padding:6px 14px;border-radius:10px;border:1.5px solid #e0d5c8;
  background:#fff;cursor:pointer;font-size:.75rem;font-weight:600;
  color:#888;font-family:inherit;
}
.btn-manage:active{border-color:#667eea;color:#667eea;transform:scale(.96)}
.task-list{display:flex;flex-direction:column;gap:8px}
.task-card{
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;border-radius:14px;
  background:#fafaf8;border:1.5px solid #f0ebe4;
  transition:all .2s;cursor:pointer;
}
.task-card:active{transform:scale(.98)}
.task-card.completed{opacity:.5;border-color:#d5f0d5;background:#f8fdf8}
.task-card.completed .task-name{text-decoration:line-through;color:#aaa}
.task-check{
  width:28px;height:28px;border-radius:50%;flex-shrink:0;
  border:2.5px solid #ddd;background:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:0;transition:all .2s;
}
.task-card.completed .task-check{
  border-color:#00b06f;background:#00b06f;font-size:.85rem;color:#fff;
}
.task-info{flex:1;min-width:0}
.task-name{font-size:.9rem;font-weight:700;color:#3a2e26;margin-bottom:1px}
.task-reward{font-size:.72rem;color:#667eea;font-weight:600}
.task-badge{
  flex-shrink:0;padding:5px 10px;border-radius:8px;
  background:linear-gradient(135deg,#e8f0ff,#dde4ff);
  font-size:.78rem;font-weight:800;color:#667eea;white-space:nowrap;
}
.task-card.completed .task-badge{background:#d5f0d5;color:#00b06f}
.task-empty{text-align:center;padding:40px 16px;color:#ccc;font-size:.85rem;line-height:1.6}

/* ── 빈 상태 ── */
.empty-state{text-align:center;padding:80px 20px;color:#bbb;width:100%}
.empty-state .icon{font-size:3.5rem;margin-bottom:16px}
.empty-state p{font-size:.95rem;margin-bottom:20px;line-height:1.6}
.btn-start{
  padding:14px 36px;border-radius:24px;border:none;
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:#fff;font-size:.95rem;font-weight:700;
  cursor:pointer;box-shadow:0 4px 16px rgba(102,126,234,.3);font-family:inherit;
}
.btn-start:active{transform:scale(.96)}

/* ── 모달 ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.5);
  display:none;align-items:flex-end;justify-content:center;
  z-index:100;backdrop-filter:blur(3px);
}
.modal-overlay.show{display:flex}
.modal{
  background:#fff;border-radius:20px 20px 0 0;
  padding:24px 20px max(env(safe-area-inset-bottom),20px);
  width:100%;max-width:520px;
  box-shadow:0 -8px 32px rgba(0,0,0,.15);
  animation:slideUp .3s cubic-bezier(.36,1.56,.64,1);
  max-height:85vh;max-height:85dvh;overflow-y:auto;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:#ddd;border-radius:4px;margin:0 auto 16px}
.modal h2{font-size:1.1rem;font-weight:700;margin-bottom:16px;text-align:center}
.modal label{display:block;font-weight:600;margin-bottom:6px;margin-top:14px;font-size:.82rem;color:#666}
.modal input[type="text"],
.modal input[type="number"]{
  width:100%;padding:12px 14px;border-radius:12px;border:2px solid #e0d5c8;
  font-size:.95rem;font-family:inherit;outline:none;transition:border .2s;
  min-height:44px;appearance:none;-webkit-appearance:none;
}
.modal input:focus{border-color:#667eea}
.modal-btns{display:flex;gap:8px;margin-top:20px}
.modal-btns button{
  flex:1;padding:14px;border-radius:14px;border:none;
  font-size:.95rem;font-weight:700;cursor:pointer;
  transition:all .15s;min-height:48px;font-family:inherit;
}
.btn-cancel{background:#f0ebe4;color:#888}
.btn-cancel:active{background:#e0d5c8}
.btn-save{
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:#fff;box-shadow:0 3px 12px rgba(102,126,234,.3);
}
.btn-save:active{transform:scale(.97)}

/* 할일 관리 모달 */
.manage-task-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 0;border-bottom:1px solid #f0ebe4;
}
.manage-task-item:last-child{border-bottom:none}
.manage-task-name{flex:1;font-size:.9rem;font-weight:600}
.manage-task-time{font-size:.8rem;color:#667eea;font-weight:700;min-width:50px;text-align:center}
.btn-remove-task{
  width:28px;height:28px;border-radius:50%;border:none;background:#fee;color:#e44;
  cursor:pointer;font-size:.8rem;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.btn-remove-task:active{background:#fdd}
.add-task-row{display:flex;gap:8px;margin-top:12px;align-items:flex-end}
.add-task-row input[type="text"]{flex:1}
.add-task-row input[type="number"]{width:80px}
.btn-add-task{
  padding:12px 16px;border-radius:12px;border:none;
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:#fff;font-size:.85rem;font-weight:700;
  cursor:pointer;font-family:inherit;min-height:44px;white-space:nowrap;
}
.btn-add-task:active{transform:scale(.95)}

/* 사용권 모달 */
.ticket{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:12px;
  border:1.5px solid #e8e0f0;background:linear-gradient(135deg,#fafafe,#f0ecf8);
  position:relative;overflow:hidden;margin-bottom:6px;
}
.ticket::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:4px;
  background:linear-gradient(180deg,#667eea,#764ba2);
}
.ticket.used{opacity:.45;border-color:#ddd;background:#f8f8f8}
.ticket.used::before{background:#ccc}
.ticket-icon{font-size:1.3rem;flex-shrink:0}
.ticket-info{flex:1;min-width:0}
.ticket-value{font-size:.85rem;font-weight:800;color:#3a2e26}
.ticket-date{font-size:.62rem;color:#aaa;margin-top:1px}
.ticket-actions{display:flex;gap:4px;flex-shrink:0}
.ticket-btn{
  padding:5px 10px;border-radius:8px;border:none;
  font-size:.7rem;font-weight:700;cursor:pointer;
  font-family:inherit;transition:all .15s;
}
.ticket-btn.use{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.ticket-btn.use:active{transform:scale(.95)}
.ticket-btn.used-label{background:#eee;color:#aaa;cursor:default}
.ticket-btn.del{background:#fee;color:#e44}
.ticket-btn.del:active{background:#fdd}
.tickets-empty{text-align:center;padding:20px;color:#ccc;font-size:.82rem}
.ticket-modal-add{
  display:flex;gap:8px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #f0ebe4;
}
.ticket-modal-add button{
  padding:10px 16px;border-radius:10px;border:none;
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:#fff;font-size:.82rem;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;
}

/* ── 모바일 세로모드: 1열 ── */
@media(max-width:700px){
  .layout{flex-direction:column;gap:12px;padding:10px 12px}
  .col-calendar{width:100%}
  .calendar{padding:14px}
  .cal-summary{grid-template-columns:1fr 1fr}
}
@media(min-width:701px){
  .modal{border-radius:20px;max-width:480px;align-self:center}
  .modal-overlay.show{align-items:center}
}

.firebase-status{
  text-align:center;padding:8px 12px;font-size:.75rem;color:#c44;
  background:#fff5f5;border-radius:10px;margin:0 16px 8px;display:none;
}
.firebase-status.show{display:block}
</style>
</head>
<body>

<div class="app-header">
  <div class="app-title">하루습관</div>
  <div class="child-selector" id="childSelector">
    <button class="btn-add-chip" onclick="openChildModal()">+</button>
  </div>
</div>

<div id="firebaseStatus" class="firebase-status">
  Firebase가 연결되지 않았습니다. 로컬 저장 모드로 동작합니다.
</div>

<div class="layout">
  <div class="empty-state" id="emptyState">
    <div class="icon">📋</div>
    <p>아이를 등록하고<br>오늘의 할일을 시작해요!</p>
    <button class="btn-start" onclick="openChildModal()">첫 아이 등록하기</button>
  </div>

  <div class="col-calendar" id="colCalendar" style="display:none">
    <div class="calendar">
      <div class="cal-header">
        <button class="cal-nav" style="border:none;background:none;padding:0"><button onclick="changeMonth(-1)" style="width:32px;height:32px;border:1.5px solid #e0d5c8;background:#fff;border-radius:50%;cursor:pointer;font-size:.85rem;color:#888;font-family:inherit">&#9664;</button></button>
        <div class="cal-title" id="calTitle"></div>
        <button class="cal-nav" style="border:none;background:none;padding:0"><button onclick="changeMonth(1)" style="width:32px;height:32px;border:1.5px solid #e0d5c8;background:#fff;border-radius:50%;cursor:pointer;font-size:.85rem;color:#888;font-family:inherit">&#9654;</button></button>
      </div>
      <div class="cal-weekdays">
        <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>
    <div class="cal-summary" id="calSummary"></div>
    <button class="btn-tickets" id="btnTickets" onclick="openTicketsModal()">
      🎟 게임 사용권 <span class="badge" id="ticketBadge">0장</span>
    </button>
  </div>

  <div class="col-tasks" id="colTasks" style="display:none">
    <div class="tasks-panel">
      <div class="tasks-header">
        <div class="tasks-title" id="tasksTitle">📋 오늘의 할일</div>
        <button class="btn-manage" onclick="openManageTasksModal()">목표</button>
      </div>
      <div class="task-list" id="taskList"></div>
    </div>
  </div>
</div>

<!-- 아이 등록 모달 -->
<div class="modal-overlay" id="childModalOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>아이 등록하기</h2>
    <label>이름</label>
    <input type="text" id="inputChildName" placeholder="예: 우진이/아진이" maxlength="10" enterkeyhint="done">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeChildModal()">취소</button>
      <button class="btn-save" onclick="saveChild()">등록하기</button>
    </div>
  </div>
</div>

<!-- 할일 관리 모달 -->
<div class="modal-overlay" id="taskModalOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>목표 관리</h2>
    <p style="font-size:.8rem;color:#999;margin-bottom:12px;text-align:center">목표를 추가하거나 삭제할 수 있어요</p>
    <div id="manageTaskList"></div>
    <div class="add-task-row">
      <input type="text" id="newTaskName" placeholder="할일 이름">
      <input type="number" id="newTaskMinutes" placeholder="분" min="1" max="999" inputmode="numeric" style="text-align:center">
      <button class="btn-add-task" onclick="addTask()">추가</button>
    </div>
    <div class="modal-btns" style="margin-top:16px">
      <button class="btn-cancel" onclick="closeTaskModal()" style="flex:1">닫기</button>
    </div>
  </div>
</div>

<!-- 게임 사용권 모달 -->
<div class="modal-overlay" id="ticketModalOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>🎟 게임 사용권</h2>
    <div class="ticket-modal-add">
      <button onclick="addManualTicket()">+ 수동 추가</button>
    </div>
    <div id="ticketModalBody"></div>
    <div class="modal-btns" style="margin-top:16px">
      <button class="btn-cancel" onclick="closeTicketsModal()" style="flex:1">닫기</button>
    </div>
  </div>
</div>

<script>
var firebaseConfig = {
  apiKey: "AIzaSyA1-xbOzJWlsSIW1V4WmeYFg6IQJxpYHdQ",
  authDomain: "praise-sticker-2a256.firebaseapp.com",
  projectId: "praise-sticker-2a256",
  storageBucket: "praise-sticker-2a256.firebasestorage.app",
  messagingSenderId: "431286052871",
  appId: "1:431286052871:web:788ca2715107b2e29e62a2"
};

var db = null, useFirebase = false;
try {
  if (firebaseConfig.apiKey !== "YOUR_API_KEY") {
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    useFirebase = true;
  }
} catch (e) { console.warn("Firebase init failed", e); }
if (!useFirebase) document.getElementById('firebaseStatus').classList.add('show');

var children = [];
var activeChildId = null;
var selectedDate = todayStr();
var viewYear, viewMonth;
var taskHistory = {};

function todayStr() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function dateStr(y,m,d) {
  return y + '-' + String(m+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
}
function formatDate(str) {
  var p = str.split('-');
  return parseInt(p[1]) + '월 ' + parseInt(p[2]) + '일';
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

(function(){var t=new Date();viewYear=t.getFullYear();viewMonth=t.getMonth();})();

/* ── 저장/불러오기 ── */
function saveLocal() {
  localStorage.setItem('todo_children', JSON.stringify(children));
  localStorage.setItem('todo_history', JSON.stringify(taskHistory));
}
function loadLocal() {
  var c = localStorage.getItem('todo_children');
  if (c) children = JSON.parse(c);
  var h = localStorage.getItem('todo_history');
  if (h) taskHistory = JSON.parse(h);
}
async function saveToFirestore() {
  if (!useFirebase) return;
  try { await db.collection('todoData').doc('main').set({ children: children, taskHistory: taskHistory }); }
  catch(e) { console.warn('Firestore save failed', e); }
}
async function loadFromFirestore() {
  if (!useFirebase) return false;
  try {
    var doc = await db.collection('todoData').doc('main').get();
    if (doc.exists) {
      children = doc.data().children || [];
      taskHistory = doc.data().taskHistory || {};
      return true;
    }
  } catch(e) { console.warn('Firestore load failed', e); }
  return false;
}
function persist() { saveLocal(); saveToFirestore(); }

function histKey(childId, dateStr) { return childId + '_' + dateStr; }

function getDayTasks(childId, ds) {
  var child = children.find(function(c){ return c.id === childId; });
  if (!child || !child.tasks.length) return [];
  var key = histKey(childId, ds);
  var hist = taskHistory[key];
  if (!hist) {
    hist = child.tasks.map(function(t) {
      return { taskId: t.id, completed: false, completedAt: '' };
    });
    taskHistory[key] = hist;
  }
  child.tasks.forEach(function(t) {
    if (!hist.some(function(h){ return h.taskId === t.id; }))
      hist.push({ taskId: t.id, completed: false, completedAt: '' });
  });
  taskHistory[key] = hist.filter(function(h) {
    return child.tasks.some(function(t){ return t.id === h.taskId; });
  });
  return taskHistory[key];
}

/* ── 아이 관리 ── */
function openChildModal() {
  document.getElementById('inputChildName').value = '';
  document.getElementById('childModalOverlay').classList.add('show');
  document.body.style.overflow = 'hidden';
  setTimeout(function(){ document.getElementById('inputChildName').focus(); }, 300);
}
function closeChildModal() {
  document.getElementById('childModalOverlay').classList.remove('show');
  document.body.style.overflow = '';
}
function saveChild() {
  var name = document.getElementById('inputChildName').value.trim();
  if (!name) { alert('이름을 입력해주세요!'); return; }
  children.push({
    id: uid(), name: name,
    tasks: [
      { id: uid(), name: '영어복습', gameMinutes: 15 },
      { id: uid(), name: '연산 문제집', gameMinutes: 15 },
      { id: uid(), name: '사고력 문제집', gameMinutes: 15 },
      { id: uid(), name: '독서 1권', gameMinutes: 20 }
    ],
    rewards: []
  });
  activeChildId = children[children.length-1].id;
  persist(); closeChildModal(); renderAll();
}
function deleteChild(id, e) {
  e.stopPropagation();
  if (!confirm('정말 삭제할까요?')) return;
  children = children.filter(function(c){ return c.id !== id; });
  if (activeChildId === id) activeChildId = children.length ? children[0].id : null;
  persist(); renderAll();
}

/* ── 할일 관리 모달 ── */
function openManageTasksModal() {
  if (!activeChildId) return;
  document.getElementById('taskModalOverlay').classList.add('show');
  document.body.style.overflow = 'hidden';
  renderManageList();
}
function closeTaskModal() {
  document.getElementById('taskModalOverlay').classList.remove('show');
  document.body.style.overflow = '';
  renderAll();
}
function renderManageList() {
  var child = children.find(function(c){ return c.id === activeChildId; });
  if (!child) return;
  var area = document.getElementById('manageTaskList');
  area.innerHTML = '';
  child.tasks.forEach(function(t, i) {
    var div = document.createElement('div');
    div.className = 'manage-task-item';
    div.innerHTML =
      '<div class="manage-task-name">' + t.name + '</div>' +
      '<div class="manage-task-time">🎮 ' + t.gameMinutes + '분</div>' +
      '<button class="btn-remove-task" onclick="removeTask(' + i + ')">✕</button>';
    area.appendChild(div);
  });
}
function addTask() {
  var child = children.find(function(c){ return c.id === activeChildId; });
  if (!child) return;
  var name = document.getElementById('newTaskName').value.trim();
  var mins = parseInt(document.getElementById('newTaskMinutes').value) || 15;
  if (!name) { alert('할일 이름을 입력해주세요!'); return; }
  child.tasks.push({ id: uid(), name: name, gameMinutes: mins });
  document.getElementById('newTaskName').value = '';
  document.getElementById('newTaskMinutes').value = '';
  persist(); renderManageList();
}
function removeTask(i) {
  var child = children.find(function(c){ return c.id === activeChildId; });
  if (!child) return;
  if (!confirm(child.tasks[i].name + ' 할일을 삭제할까요?')) return;
  child.tasks.splice(i, 1);
  persist(); renderManageList();
}

/* ── 할일 토글 ── */
function toggleTask(taskId) {
  var child = children.find(function(c){ return c.id === activeChildId; });
  if (!child) return;
  var dayTasks = getDayTasks(activeChildId, selectedDate);
  var item = dayTasks.find(function(h){ return h.taskId === taskId; });
  if (!item) return;
  if (!item.completed) {
    var task = child.tasks.find(function(t){ return t.id === taskId; });
    if (!task) return;
    item.completed = true;
    var now = new Date();
    item.completedAt = now.getFullYear() + '.' + (now.getMonth()+1) + '.' + now.getDate() + ' ' +
      String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
    if (!child.rewards) child.rewards = [];
    child.rewards.push({
      type:'game', value:task.gameMinutes, taskName:task.name,
      date:item.completedAt, used:false, usedDate:''
    });
  } else {
    var task = child.tasks.find(function(t){ return t.id === taskId; });
    item.completed = false; item.completedAt = '';
    if (task && child.rewards) {
      for (var ri = child.rewards.length-1; ri >= 0; ri--) {
        if (child.rewards[ri].taskName === task.name && !child.rewards[ri].used) {
          child.rewards.splice(ri, 1); break;
        }
      }
    }
  }
  persist(); renderAll();
}

/* ── 사용권 모달 ── */
function openTicketsModal() {
  document.getElementById('ticketModalOverlay').classList.add('show');
  document.body.style.overflow = 'hidden';
  renderTicketModal();
}
function closeTicketsModal() {
  document.getElementById('ticketModalOverlay').classList.remove('show');
  document.body.style.overflow = '';
}
function renderTicketModal() {
  var child = children.find(function(c){ return c.id === activeChildId; });
  var body = document.getElementById('ticketModalBody');
  if (!child || !child.rewards || !child.rewards.length) {
    body.innerHTML = '<div class="tickets-empty">아직 사용권이 없어요.<br>할일을 완료해서 게임시간을 모아보세요!</div>';
    return;
  }
  body.innerHTML = '';
  child.rewards.forEach(function(r, i) {
    var div = document.createElement('div');
    div.className = 'ticket' + (r.used ? ' used' : '');
    div.innerHTML =
      '<div class="ticket-icon">🎮</div>' +
      '<div class="ticket-info">' +
        '<div class="ticket-value">' + r.value + '분 게임시간</div>' +
        '<div class="ticket-date">' + r.date + ' | ' + (r.taskName||'') + '</div>' +
        (r.used && r.usedDate ? '<div class="ticket-date" style="color:#00b06f">사용: ' + r.usedDate + '</div>' : '') +
      '</div>' +
      '<div class="ticket-actions">' +
        (!r.used ?
          '<button class="ticket-btn use" onclick="useTicket(' + i + ')">사용하기</button>' :
          '<span class="ticket-btn used-label">사용됨</span>') +
        '<button class="ticket-btn del" onclick="deleteTicket(' + i + ')">✕</button>' +
      '</div>';
    body.appendChild(div);
  });
}
function useTicket(idx) {
  var child = children.find(function(c){ return c.id === activeChildId; });
  if (!child || !child.rewards[idx] || child.rewards[idx].used) return;
  if (!confirm(child.rewards[idx].value + '분 게임시간 사용권을 사용할까요?')) return;
  var now = new Date();
  child.rewards[idx].used = true;
  child.rewards[idx].usedDate = now.getFullYear() + '.' + (now.getMonth()+1) + '.' + now.getDate() + ' ' +
    String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  persist(); renderTicketModal(); renderAll();
}
function deleteTicket(idx) {
  var child = children.find(function(c){ return c.id === activeChildId; });
  if (!child) return;
  if (!confirm('이 사용권을 삭제할까요?')) return;
  child.rewards.splice(idx, 1);
  persist(); renderTicketModal(); renderAll();
}
function addManualTicket() {
  var child = children.find(function(c){ return c.id === activeChildId; });
  if (!child) return;
  var input = prompt('추가할 게임시간(분)을 입력하세요:');
  if (!input) return;
  var val = parseInt(input);
  if (!val || val <= 0) { alert('올바른 숫자를 입력해주세요!'); return; }
  if (!child.rewards) child.rewards = [];
  var now = new Date();
  var ds = now.getFullYear() + '.' + (now.getMonth()+1) + '.' + now.getDate() + ' ' +
    String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  child.rewards.push({ type:'game', value:val, taskName:'직접 추가', date:ds, used:false, usedDate:'' });
  persist(); renderTicketModal(); renderAll();
}

/* ── 캘린더 ── */
function changeMonth(dir) {
  viewMonth += dir;
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  renderCalendar();
}

function renderCalendar() {
  document.getElementById('calTitle').textContent = viewYear + '년 ' + (viewMonth+1) + '월';
  var grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  var firstDay = new Date(viewYear, viewMonth, 1).getDay();
  var daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  var prevDays = new Date(viewYear, viewMonth, 0).getDate();
  var td = todayStr();

  // 이전 달
  for (var i = firstDay - 1; i >= 0; i--) {
    var el = document.createElement('div');
    el.className = 'cal-day other-month';
    el.textContent = prevDays - i;
    grid.appendChild(el);
  }
  // 이번 달
  for (var d = 1; d <= daysInMonth; d++) {
    var ds = dateStr(viewYear, viewMonth, d);
    var isToday = (ds === td);
    var isSelected = (ds === selectedDate);
    var isFuture = (ds > td);
    var dow = new Date(viewYear, viewMonth, d).getDay();

    var dayTasks = (!isFuture && activeChildId) ? getDayTasks(activeChildId, ds) : [];
    var doneCount = dayTasks.filter(function(t){ return t.completed; }).length;
    var hasDone = doneCount > 0;
    var allDone = dayTasks.length > 0 && doneCount === dayTasks.length;

    var el = document.createElement('div');
    el.className = 'cal-day' +
      (isToday ? ' today' : '') +
      (isSelected ? ' selected' : '') +
      (isFuture ? ' future' : '') +
      (allDone ? ' all-done has-done' : (hasDone ? ' has-done' : '')) +
      (dow === 0 ? ' sun' : '') +
      (dow === 6 ? ' sat' : '');
    el.textContent = d;
    if (!isFuture) {
      el.onclick = (function(date) {
        return function() { selectedDate = date; renderAll(); };
      })(ds);
    }
    grid.appendChild(el);
  }
  // 다음 달
  var totalCells = firstDay + daysInMonth;
  var remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
  for (var i = 1; i <= remaining; i++) {
    var el = document.createElement('div');
    el.className = 'cal-day other-month';
    el.textContent = i;
    grid.appendChild(el);
  }
}

/* ── 렌더링 ── */
function renderAll() {
  renderChildSelector();
  if (activeChildId) {
    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('colCalendar').style.display = 'block';
    document.getElementById('colTasks').style.display = 'block';
    renderCalendar();
    renderSummary();
    renderTaskList();
    renderTicketBadge();
  } else {
    document.getElementById('emptyState').style.display = 'block';
    document.getElementById('colCalendar').style.display = 'none';
    document.getElementById('colTasks').style.display = 'none';
  }
}

function renderChildSelector() {
  var bar = document.getElementById('childSelector');
  bar.innerHTML = '';
  children.forEach(function(c) {
    var chip = document.createElement('div');
    chip.className = 'child-chip' + (c.id === activeChildId ? ' active' : '');
    chip.innerHTML = c.name +
      '<span style="margin-left:4px;opacity:.5;font-size:.7rem;cursor:pointer" onclick="deleteChild(\'' + c.id + '\', event)">✕</span>';
    chip.onclick = function() { activeChildId = c.id; renderAll(); };
    bar.appendChild(chip);
  });
  var addBtn = document.createElement('button');
  addBtn.className = 'btn-add-chip';
  addBtn.textContent = '+';
  addBtn.onclick = openChildModal;
  bar.appendChild(addBtn);
}

function renderSummary() {
  var child = children.find(function(c){ return c.id === activeChildId; });
  if (!child) return;
  var dayTasks = getDayTasks(activeChildId, selectedDate);
  var done = dayTasks.filter(function(t){ return t.completed; }).length;
  var total = dayTasks.length;
  var earned = 0;
  dayTasks.forEach(function(dt) {
    if (dt.completed) {
      var t = child.tasks.find(function(x){ return x.id === dt.taskId; });
      if (t) earned += t.gameMinutes;
    }
  });
  // 총 미사용 게임시간 계산
  var totalUnused = 0;
  if (child.rewards) {
    child.rewards.forEach(function(r) { if (!r.used) totalUnused += r.value; });
  }
  var totalStr;
  if (totalUnused >= 60) {
    var hrs = Math.floor(totalUnused / 60);
    var mins = totalUnused % 60;
    totalStr = hrs + '시간' + (mins > 0 ? ' ' + mins + '분' : '');
  } else {
    totalStr = totalUnused + '분';
  }

  document.getElementById('calSummary').innerHTML =
    '<div class="s-card done"><div class="num">' + done + '/' + total + '</div><div class="lbl">완료</div></div>' +
    '<div class="s-card time"><div class="num">' + earned + '분</div><div class="lbl">오늘 획득</div></div>' +
    '<div class="s-card total"><div class="num">' + totalStr + '</div><div class="lbl">총 게임시간</div></div>';
}

function renderTaskList() {
  var child = children.find(function(c){ return c.id === activeChildId; });
  if (!child) return;
  var title = document.getElementById('tasksTitle');
  title.textContent = (selectedDate === todayStr()) ? '📋 오늘의 할일' : '📋 ' + formatDate(selectedDate) + ' 할일';

  var area = document.getElementById('taskList');
  area.innerHTML = '';
  if (!child.tasks.length) {
    area.innerHTML = '<div class="task-empty">등록된 할일이 없어요.<br>할일 관리에서 추가해보세요!</div>';
    return;
  }
  var dayTasks = getDayTasks(activeChildId, selectedDate);
  child.tasks.forEach(function(task) {
    var hist = dayTasks.find(function(h){ return h.taskId === task.id; });
    var done = hist ? hist.completed : false;
    var card = document.createElement('div');
    card.className = 'task-card' + (done ? ' completed' : '');
    card.innerHTML =
      '<div class="task-check">' + (done ? '✓' : '') + '</div>' +
      '<div class="task-info">' +
        '<div class="task-name">' + task.name + '</div>' +
        '<div class="task-reward">🎮 완료 시 ' + task.gameMinutes + '분</div>' +
      '</div>' +
      '<div class="task-badge">' + (done ? '완료!' : task.gameMinutes + '분') + '</div>';
    card.onclick = function() { toggleTask(task.id); };
    area.appendChild(card);
  });
}

function renderTicketBadge() {
  var child = children.find(function(c){ return c.id === activeChildId; });
  var unused = 0;
  if (child && child.rewards) {
    unused = child.rewards.filter(function(r){ return !r.used; }).length;
  }
  document.getElementById('ticketBadge').textContent = unused + '장';
}

/* ── 모달 닫기 ── */
document.getElementById('childModalOverlay').addEventListener('click', function(e){ if(e.target===this) closeChildModal(); });
document.getElementById('taskModalOverlay').addEventListener('click', function(e){ if(e.target===this) closeTaskModal(); });
document.getElementById('ticketModalOverlay').addEventListener('click', function(e){ if(e.target===this) closeTicketsModal(); });

/* ── 초기화 ── */
(async function init() {
  var loaded = await loadFromFirestore();
  if (!loaded) loadLocal();
  if (children.length) activeChildId = children[0].id;
  selectedDate = todayStr();
  renderAll();
})();
</script>
