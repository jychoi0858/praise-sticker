<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="mobile-web-app-capable" content="yes">
<title>우리 아이 할일표</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{
  font-family:'Noto Sans KR',system-ui,-apple-system,sans-serif;
  min-height:100vh;min-height:100dvh;
  background:#f5f3ee;color:#3a2e26;
  overscroll-behavior:none;-webkit-font-smoothing:antialiased;
}

/* ── 헤더 ── */
.app-header{
  width:100%;
  padding:max(env(safe-area-inset-top),12px) 16px 12px;
  background:#fff;
  display:flex;align-items:center;gap:12px;
  box-shadow:0 1px 8px rgba(0,0,0,.06);
  position:sticky;top:0;z-index:50;
}
.app-title{font-size:1.2rem;font-weight:800;letter-spacing:-.02em;flex-shrink:0}
.child-selector{
  display:flex;gap:6px;flex:1;overflow-x:auto;
  scrollbar-width:none;-webkit-overflow-scrolling:touch;
}
.child-selector::-webkit-scrollbar{display:none}
.child-chip{
  flex-shrink:0;padding:8px 16px;border-radius:20px;
  border:2px solid #e0d5c8;background:#fff;
  cursor:pointer;font-size:.82rem;font-weight:600;
  transition:all .15s;white-space:nowrap;min-height:40px;
  display:flex;align-items:center;gap:4px;
}
.child-chip:active{transform:scale(.96)}
.child-chip.active{
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:#fff;border-color:transparent;
  box-shadow:0 2px 10px rgba(102,126,234,.3);
}
.btn-add-chip{
  flex-shrink:0;width:40px;height:40px;border-radius:50%;
  border:2px dashed #ccc;background:transparent;
  cursor:pointer;font-size:1.2rem;color:#aaa;
  display:flex;align-items:center;justify-content:center;
}
.btn-add-chip:active{border-color:#667eea;color:#667eea}
.header-actions{display:flex;gap:6px;flex-shrink:0}
.btn-icon{
  width:40px;height:40px;border:none;background:#f0ebe4;
  border-radius:50%;cursor:pointer;font-size:1rem;
  display:flex;align-items:center;justify-content:center;color:#888;
}
.btn-icon:active{background:#e0d5c8;transform:scale(.92)}

/* ── 메인 컨텐츠 ── */
.main{
  width:100%;max-width:800px;margin:0 auto;
  padding:12px 16px max(env(safe-area-inset-bottom),20px);
}

/* ── 날짜 스트립 ── */
.date-strip{
  display:flex;gap:6px;overflow-x:auto;
  padding:8px 0 12px;scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
}
.date-strip::-webkit-scrollbar{display:none}
.date-item{
  flex-shrink:0;width:52px;padding:8px 0;border-radius:14px;
  text-align:center;cursor:pointer;transition:all .15s;
  border:2px solid transparent;background:#fff;
}
.date-item:active{transform:scale(.95)}
.date-item .day-name{font-size:.65rem;color:#aaa;font-weight:600;margin-bottom:2px}
.date-item .day-num{font-size:1.1rem;font-weight:700;color:#555}
.date-item.today{border-color:#667eea;background:#f0edff}
.date-item.today .day-num{color:#667eea}
.date-item.selected{background:linear-gradient(135deg,#667eea,#764ba2);border-color:transparent}
.date-item.selected .day-name{color:rgba(255,255,255,.7)}
.date-item.selected .day-num{color:#fff}
.date-item.has-completed{position:relative}
.date-item.has-completed::after{
  content:'';width:6px;height:6px;border-radius:50%;
  background:#00b06f;position:absolute;bottom:4px;left:50%;transform:translateX(-50%);
}

/* ── 할일 섹션 ── */
.section-header{
  display:flex;align-items:center;justify-content:space-between;
  margin:8px 0 10px;
}
.section-title{font-size:1rem;font-weight:700;display:flex;align-items:center;gap:6px}
.section-title .date-label{font-size:.85rem;color:#999;font-weight:600}
.btn-manage-tasks{
  padding:6px 14px;border-radius:12px;border:1.5px solid #e0d5c8;
  background:#fff;cursor:pointer;font-size:.78rem;font-weight:600;
  color:#888;font-family:inherit;
}
.btn-manage-tasks:active{border-color:#667eea;color:#667eea;transform:scale(.96)}

.task-list{display:flex;flex-direction:column;gap:10px}

.task-card{
  display:flex;align-items:center;gap:14px;
  padding:16px 18px;border-radius:16px;
  background:#fff;border:1.5px solid #f0ebe4;
  transition:all .2s;cursor:pointer;
}
.task-card:active{transform:scale(.98)}
.task-card.completed{opacity:.55;border-color:#d5f0d5}
.task-card.completed .task-name{text-decoration:line-through;color:#aaa}

.task-check{
  width:30px;height:30px;border-radius:50%;flex-shrink:0;
  border:2.5px solid #ddd;background:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:0;transition:all .2s;
}
.task-card.completed .task-check{
  border-color:#00b06f;background:#00b06f;
  font-size:.9rem;color:#fff;
}

.task-info{flex:1;min-width:0}
.task-name{font-size:.95rem;font-weight:700;color:#3a2e26;margin-bottom:2px}
.task-reward{font-size:.75rem;color:#667eea;font-weight:600;display:flex;align-items:center;gap:4px}

.task-time-badge{
  flex-shrink:0;padding:6px 12px;border-radius:10px;
  background:linear-gradient(135deg,#e8f0ff,#dde4ff);
  font-size:.8rem;font-weight:800;color:#667eea;
  white-space:nowrap;
}
.task-card.completed .task-time-badge{
  background:linear-gradient(135deg,#d5f0d5,#c5e8c5);
  color:#00b06f;
}

.task-empty{
  text-align:center;padding:40px 20px;color:#ccc;
  font-size:.9rem;line-height:1.6;
}

/* ── 게임 사용권 ── */
.tickets-section{margin-top:20px}
.tickets-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;border-radius:14px 14px 0 0;
  background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;
  font-size:.9rem;font-weight:800;
}
.tickets-header .btn-add-ticket{
  background:rgba(255,255,255,.25);border:none;color:#fff;
  font-size:.78rem;font-weight:700;padding:4px 12px;
  border-radius:8px;cursor:pointer;font-family:inherit;
}
.tickets-header .btn-add-ticket:active{background:rgba(255,255,255,.4)}
.tickets-body{
  background:#fff;border-radius:0 0 14px 14px;
  padding:12px;display:flex;flex-direction:column;gap:8px;
  border:1.5px solid #f0ebe4;border-top:none;
}
.ticket{
  display:flex;align-items:center;gap:12px;
  padding:10px 14px;border-radius:12px;
  border:1.5px solid #e8e0f0;background:linear-gradient(135deg,#fafafe,#f0ecf8);
  position:relative;overflow:hidden;transition:all .15s;
}
.ticket::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:4px;
  background:linear-gradient(180deg,#667eea,#764ba2);
}
.ticket.used{opacity:.45;border-color:#ddd;background:#f8f8f8}
.ticket.used::before{background:#ccc}
.ticket-icon{font-size:1.5rem;flex-shrink:0}
.ticket-info{flex:1;min-width:0}
.ticket-value{font-size:.9rem;font-weight:800;color:#3a2e26}
.ticket-date{font-size:.65rem;color:#aaa;margin-top:1px}
.ticket-actions{display:flex;gap:4px;flex-shrink:0}
.ticket-btn{
  padding:6px 12px;border-radius:8px;border:none;
  font-size:.72rem;font-weight:700;cursor:pointer;
  font-family:inherit;transition:all .15s;min-height:32px;
}
.ticket-btn.use{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.ticket-btn.use:active{transform:scale(.95)}
.ticket-btn.used-label{background:#eee;color:#aaa;cursor:default}
.ticket-btn.del{background:#fee;color:#e44;padding:6px 8px}
.ticket-btn.del:active{background:#fdd}
.tickets-empty{text-align:center;padding:14px;color:#ccc;font-size:.8rem}
.ticket-pop{animation:ticketAppear .5s cubic-bezier(.36,1.56,.64,1)}
@keyframes ticketAppear{0%{transform:translateX(40px);opacity:0}100%{transform:translateX(0);opacity:1}}

/* ── 빈 상태 ── */
.empty-state{text-align:center;padding:60px 20px;color:#bbb}
.empty-state .icon{font-size:3.5rem;margin-bottom:16px}
.empty-state p{font-size:.95rem;margin-bottom:20px;line-height:1.6}
.btn-start{
  padding:14px 36px;border-radius:24px;border:none;
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:#fff;font-size:.95rem;font-weight:700;
  cursor:pointer;box-shadow:0 4px 16px rgba(102,126,234,.3);
  font-family:inherit;
}
.btn-start:active{transform:scale(.96)}

/* ── 모달 ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.5);
  display:none;align-items:flex-end;justify-content:center;
  z-index:100;backdrop-filter:blur(3px);
}
.modal-overlay.show{display:flex}
.modal{
  background:#fff;border-radius:20px 20px 0 0;
  padding:24px 20px max(env(safe-area-inset-bottom),20px);
  width:100%;max-width:520px;
  box-shadow:0 -8px 32px rgba(0,0,0,.15);
  animation:slideUp .3s cubic-bezier(.36,1.56,.64,1);
  max-height:85vh;max-height:85dvh;overflow-y:auto;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:#ddd;border-radius:4px;margin:0 auto 16px}
.modal h2{font-size:1.1rem;font-weight:700;margin-bottom:16px;text-align:center}
.modal label{display:block;font-weight:600;margin-bottom:6px;margin-top:14px;font-size:.82rem;color:#666}
.modal input[type="text"],
.modal input[type="number"]{
  width:100%;padding:12px 14px;border-radius:12px;border:2px solid #e0d5c8;
  font-size:.95rem;font-family:inherit;outline:none;transition:border .2s;
  min-height:44px;appearance:none;-webkit-appearance:none;
}
.modal input:focus{border-color:#667eea}
.modal-btns{display:flex;gap:8px;margin-top:20px}
.modal-btns button{
  flex:1;padding:14px;border-radius:14px;border:none;
  font-size:.95rem;font-weight:700;cursor:pointer;
  transition:all .15s;min-height:48px;font-family:inherit;
}
.btn-cancel{background:#f0ebe4;color:#888}
.btn-cancel:active{background:#e0d5c8}
.btn-save{
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:#fff;box-shadow:0 3px 12px rgba(102,126,234,.3);
}
.btn-save:active{transform:scale(.97)}

/* ── 할일 관리 ── */
.manage-task-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 0;border-bottom:1px solid #f0ebe4;
}
.manage-task-item:last-child{border-bottom:none}
.manage-task-name{flex:1;font-size:.9rem;font-weight:600}
.manage-task-time{font-size:.8rem;color:#667eea;font-weight:700;min-width:50px;text-align:center}
.btn-remove-task{
  width:28px;height:28px;border-radius:50%;
  border:none;background:#fee;color:#e44;
  cursor:pointer;font-size:.8rem;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.btn-remove-task:active{background:#fdd}
.add-task-row{display:flex;gap:8px;margin-top:12px;align-items:flex-end}
.add-task-row input[type="text"]{flex:1}
.add-task-row input[type="number"]{width:80px}
.btn-add-task{
  padding:12px 16px;border-radius:12px;border:none;
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:#fff;font-size:.85rem;font-weight:700;
  cursor:pointer;font-family:inherit;min-height:44px;white-space:nowrap;
}
.btn-add-task:active{transform:scale(.95)}

/* ── 오늘 요약 배너 ── */
.today-summary{
  display:flex;gap:10px;margin-bottom:12px;
}
.summary-card{
  flex:1;padding:12px;border-radius:14px;background:#fff;
  text-align:center;border:1.5px solid #f0ebe4;
}
.summary-card .num{font-size:1.4rem;font-weight:800}
.summary-card .label{font-size:.7rem;color:#999;font-weight:600;margin-top:2px}
.summary-card.done .num{color:#00b06f}
.summary-card.remain .num{color:#e8855a}
.summary-card.earned .num{color:#667eea}

/* ── 가로모드 최적화 ── */
@media(orientation:landscape) and (max-height:500px){
  .app-header{padding:6px 16px}
  .app-title{font-size:1rem}
  .main{padding:8px 16px;max-width:100%;display:flex;gap:16px;flex-wrap:wrap}
  .date-strip{padding:4px 0 8px}
  .date-item{width:44px;padding:6px 0}
  .date-item .day-num{font-size:.95rem}
  .section-header{margin:4px 0 6px}
  .task-card{padding:10px 14px}
  .today-summary{margin-bottom:8px}
  .summary-card{padding:8px}
  .summary-card .num{font-size:1.1rem}
  .left-panel{flex:1;min-width:300px}
  .right-panel{flex:1;min-width:260px}
}
@media(orientation:landscape) and (min-height:501px){
  .main{max-width:900px}
}

/* ── 반응형 ── */
@media(max-width:360px){
  .date-item{width:44px}.date-item .day-num{font-size:.95rem}
  .task-name{font-size:.88rem}
  .app-title{font-size:1rem}
}
@media(min-width:769px){
  .modal{border-radius:20px;max-width:480px;align-self:center}
  .modal-overlay.show{align-items:center}
}

.firebase-status{
  text-align:center;padding:8px 12px;font-size:.75rem;color:#c44;
  background:#fff5f5;border-radius:10px;margin:8px 0;display:none;
}
.firebase-status.show{display:block}
</style>
</head>
<body>

<div class="app-header">
  <div class="app-title">할일표</div>
  <div class="child-selector" id="childSelector">
    <button class="btn-add-chip" onclick="openChildModal()">+</button>
  </div>
  <div class="header-actions">
    <button class="btn-icon" onclick="openManageTasksModal()" title="할일 관리">&#9998;</button>
  </div>
</div>

<div class="main">
  <div id="firebaseStatus" class="firebase-status">
    Firebase가 연결되지 않았습니다. 로컬 저장 모드로 동작합니다.
  </div>

  <div class="empty-state" id="emptyState">
    <div class="icon">📋</div>
    <p>아이를 등록하고<br>오늘의 할일을 시작해요!</p>
    <button class="btn-start" onclick="openChildModal()">첫 아이 등록하기</button>
  </div>

  <div id="mainContent" style="display:none">
    <div class="date-strip" id="dateStrip"></div>

    <div class="today-summary" id="todaySummary"></div>

    <div class="section-header">
      <div class="section-title">
        <span id="sectionDateLabel"></span>
      </div>
      <button class="btn-manage-tasks" onclick="openManageTasksModal()">할일 관리</button>
    </div>

    <div class="task-list" id="taskList"></div>

    <div class="tickets-section" id="ticketsSection">
      <div class="tickets-header">
        <span>🎟 게임 사용권</span>
        <button class="btn-add-ticket" onclick="addManualTicket()">+ 추가</button>
      </div>
      <div class="tickets-body" id="ticketsBody"></div>
    </div>
  </div>
</div>

<!-- 아이 등록 모달 -->
<div class="modal-overlay" id="childModalOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="childModalTitle">아이 등록하기</h2>
    <label>이름</label>
    <input type="text" id="inputChildName" placeholder="예: 우진이/아진이" maxlength="10" enterkeyhint="done">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeChildModal()">취소</button>
      <button class="btn-save" onclick="saveChild()">등록하기</button>
    </div>
  </div>
</div>

<!-- 할일 관리 모달 -->
<div class="modal-overlay" id="taskModalOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>할일 관리</h2>
    <p style="font-size:.8rem;color:#999;margin-bottom:12px;text-align:center">할일을 추가하거나 삭제할 수 있어요</p>
    <div id="manageTaskList"></div>
    <div class="add-task-row">
      <input type="text" id="newTaskName" placeholder="할일 이름">
      <input type="number" id="newTaskMinutes" placeholder="분" min="1" max="999" inputmode="numeric" style="text-align:center">
      <button class="btn-add-task" onclick="addTask()">추가</button>
    </div>
    <div class="modal-btns" style="margin-top:16px">
      <button class="btn-cancel" onclick="closeTaskModal()" style="flex:1">닫기</button>
    </div>
  </div>
</div>

<script>
var firebaseConfig = {
  apiKey: "AIzaSyA1-xbOzJWlsSIW1V4WmeYFg6IQJxpYHdQ",
  authDomain: "praise-sticker-2a256.firebaseapp.com",
  projectId: "praise-sticker-2a256",
  storageBucket: "praise-sticker-2a256.firebasestorage.app",
  messagingSenderId: "431286052871",
  appId: "1:431286052871:web:788ca2715107b2e29e62a2"
};

var db = null, useFirebase = false;
try {
  if (firebaseConfig.apiKey !== "YOUR_API_KEY") {
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    useFirebase = true;
  }
} catch (e) { console.warn("Firebase init failed", e); }
if (!useFirebase) document.getElementById('firebaseStatus').classList.add('show');

/* ── 데이터 ── */
var children = [];
var activeChildId = null;
var selectedDate = todayStr();
var taskHistory = {};

function todayStr() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function formatDate(str) {
  var parts = str.split('-');
  return parseInt(parts[1]) + '월 ' + parseInt(parts[2]) + '일';
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

/* ── 저장/불러오기 ── */
function saveLocal() {
  localStorage.setItem('todo_children', JSON.stringify(children));
  localStorage.setItem('todo_history', JSON.stringify(taskHistory));
}
function loadLocal() {
  var c = localStorage.getItem('todo_children');
  if (c) children = JSON.parse(c);
  var h = localStorage.getItem('todo_history');
  if (h) taskHistory = JSON.parse(h);
}
async function saveToFirestore() {
  if (!useFirebase) return;
  try { await db.collection('todoData').doc('main').set({ children: children, taskHistory: taskHistory }); }
  catch(e) { console.warn('Firestore save failed', e); }
}
async function loadFromFirestore() {
  if (!useFirebase) return false;
  try {
    var doc = await db.collection('todoData').doc('main').get();
    if (doc.exists) {
      children = doc.data().children || [];
      taskHistory = doc.data().taskHistory || {};
      return true;
    }
  } catch(e) { console.warn('Firestore load failed', e); }
  return false;
}
function persist() { saveLocal(); saveToFirestore(); }

/* ── 히스토리 키 ── */
function histKey(childId, dateStr) { return childId + '_' + dateStr; }

function getDayTasks(childId, dateStr) {
  var child = children.find(function(c){ return c.id === childId; });
  if (!child) return [];
  var key = histKey(childId, dateStr);
  var hist = taskHistory[key];
  if (!hist) {
    hist = child.tasks.map(function(t) {
      return { taskId: t.id, completed: false, completedAt: '' };
    });
    taskHistory[key] = hist;
  }
  // 새 할일이 추가됐으면 동기화
  child.tasks.forEach(function(t) {
    var exists = hist.some(function(h){ return h.taskId === t.id; });
    if (!exists) hist.push({ taskId: t.id, completed: false, completedAt: '' });
  });
  // 삭제된 할일 제거
  taskHistory[key] = hist.filter(function(h) {
    return child.tasks.some(function(t){ return t.id === h.taskId; });
  });
  return taskHistory[key];
}

/* ── 아이 관리 ── */
function openChildModal() {
  document.getElementById('inputChildName').value = '';
  document.getElementById('childModalTitle').textContent = '아이 등록하기';
  document.getElementById('childModalOverlay').classList.add('show');
  document.body.style.overflow = 'hidden';
  setTimeout(function(){ document.getElementById('inputChildName').focus(); }, 300);
}
function closeChildModal() {
  document.getElementById('childModalOverlay').classList.remove('show');
  document.body.style.overflow = '';
}
function saveChild() {
  var name = document.getElementById('inputChildName').value.trim();
  if (!name) { alert('이름을 입력해주세요!'); return; }
  var child = {
    id: uid(), name: name,
    tasks: [
      { id: uid(), name: '영어복습', gameMinutes: 15 },
      { id: uid(), name: '연산 문제집', gameMinutes: 15 },
      { id: uid(), name: '사고력 문제집', gameMinutes: 15 },
      { id: uid(), name: '독서 1권', gameMinutes: 20 }
    ],
    rewards: []
  };
  children.push(child);
  activeChildId = child.id;
  persist(); closeChildModal(); renderAll();
}
function deleteChild(id, e) {
  e.stopPropagation();
  if (!confirm('정말 삭제할까요?')) return;
  children = children.filter(function(c){ return c.id !== id; });
  if (activeChildId === id) activeChildId = children.length ? children[0].id : null;
  persist(); renderAll();
}

/* ── 할일 관리 모달 ── */
function openManageTasksModal() {
  var child = children.find(function(c){ return c.id === activeChildId; });
  if (!child) return;
  document.getElementById('taskModalOverlay').classList.add('show');
  document.body.style.overflow = 'hidden';
  renderManageList();
}
function closeTaskModal() {
  document.getElementById('taskModalOverlay').classList.remove('show');
  document.body.style.overflow = '';
  renderAll();
}
function renderManageList() {
  var child = children.find(function(c){ return c.id === activeChildId; });
  if (!child) return;
  var area = document.getElementById('manageTaskList');
  area.innerHTML = '';
  child.tasks.forEach(function(t, i) {
    var div = document.createElement('div');
    div.className = 'manage-task-item';
    div.innerHTML =
      '<div class="manage-task-name">' + t.name + '</div>' +
      '<div class="manage-task-time">🎮 ' + t.gameMinutes + '분</div>' +
      '<button class="btn-remove-task" onclick="removeTask(' + i + ')">✕</button>';
    area.appendChild(div);
  });
}
function addTask() {
  var child = children.find(function(c){ return c.id === activeChildId; });
  if (!child) return;
  var name = document.getElementById('newTaskName').value.trim();
  var mins = parseInt(document.getElementById('newTaskMinutes').value) || 15;
  if (!name) { alert('할일 이름을 입력해주세요!'); return; }
  child.tasks.push({ id: uid(), name: name, gameMinutes: mins });
  document.getElementById('newTaskName').value = '';
  document.getElementById('newTaskMinutes').value = '';
  persist(); renderManageList();
}
function removeTask(i) {
  var child = children.find(function(c){ return c.id === activeChildId; });
  if (!child) return;
  if (!confirm(child.tasks[i].name + ' 할일을 삭제할까요?')) return;
  child.tasks.splice(i, 1);
  persist(); renderManageList();
}

/* ── 할일 완료 토글 ── */
function toggleTask(taskId) {
  var child = children.find(function(c){ return c.id === activeChildId; });
  if (!child) return;
  var dayTasks = getDayTasks(activeChildId, selectedDate);
  var item = dayTasks.find(function(h){ return h.taskId === taskId; });
  if (!item) return;

  if (!item.completed) {
    var task = child.tasks.find(function(t){ return t.id === taskId; });
    if (!task) return;
    item.completed = true;
    var now = new Date();
    item.completedAt = now.getFullYear() + '.' + (now.getMonth()+1) + '.' + now.getDate() + ' ' +
      String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
    // 게임 사용권 자동 지급
    if (!child.rewards) child.rewards = [];
    child.rewards.push({
      type: 'game', value: task.gameMinutes,
      taskName: task.name,
      date: item.completedAt, used: false, usedDate: ''
    });
  } else {
    // 완료 취소 — 마지막으로 지급된 해당 할일 사용권도 제거
    var task = child.tasks.find(function(t){ return t.id === taskId; });
    item.completed = false;
    item.completedAt = '';
    if (task && child.rewards) {
      for (var ri = child.rewards.length - 1; ri >= 0; ri--) {
        if (child.rewards[ri].taskName === task.name && !child.rewards[ri].used) {
          child.rewards.splice(ri, 1);
          break;
        }
      }
    }
  }
  persist(); renderAll();
}

/* ── 사용권 ── */
function useTicket(idx) {
  var child = children.find(function(c){ return c.id === activeChildId; });
  if (!child || !child.rewards || !child.rewards[idx]) return;
  if (child.rewards[idx].used) return;
  var r = child.rewards[idx];
  if (!confirm(r.value + '분 게임시간 사용권을 사용할까요?')) return;
  var now = new Date();
  child.rewards[idx].used = true;
  child.rewards[idx].usedDate = now.getFullYear() + '.' + (now.getMonth()+1) + '.' + now.getDate() + ' ' +
    String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  persist(); renderTickets();
}
function deleteTicket(idx) {
  var child = children.find(function(c){ return c.id === activeChildId; });
  if (!child || !child.rewards) return;
  if (!confirm('이 사용권을 삭제할까요?')) return;
  child.rewards.splice(idx, 1);
  persist(); renderTickets();
}
function addManualTicket() {
  var child = children.find(function(c){ return c.id === activeChildId; });
  if (!child) return;
  var input = prompt('추가할 게임시간(분)을 입력하세요:');
  if (!input) return;
  var val = parseInt(input);
  if (!val || val <= 0) { alert('올바른 숫자를 입력해주세요!'); return; }
  if (!child.rewards) child.rewards = [];
  var now = new Date();
  var dateStr = now.getFullYear() + '.' + (now.getMonth()+1) + '.' + now.getDate() + ' ' +
    String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  child.rewards.push({ type: 'game', value: val, taskName: '직접 추가', date: dateStr, used: false, usedDate: '' });
  persist(); renderAll();
}

/* ── 렌더링 ── */
function renderAll() {
  renderChildSelector();
  if (activeChildId) {
    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
    renderDateStrip();
    renderSummary();
    renderTaskList();
    renderTickets();
  } else {
    document.getElementById('emptyState').style.display = 'block';
    document.getElementById('mainContent').style.display = 'none';
  }
}

function renderChildSelector() {
  var bar = document.getElementById('childSelector');
  bar.innerHTML = '';
  children.forEach(function(c) {
    var chip = document.createElement('div');
    chip.className = 'child-chip' + (c.id === activeChildId ? ' active' : '');
    chip.innerHTML = c.name +
      '<span style="margin-left:4px;opacity:.5;font-size:.7rem;cursor:pointer" onclick="deleteChild(\'' + c.id + '\', event)">✕</span>';
    chip.onclick = function() { activeChildId = c.id; renderAll(); };
    bar.appendChild(chip);
  });
  var addBtn = document.createElement('button');
  addBtn.className = 'btn-add-chip';
  addBtn.textContent = '+';
  addBtn.onclick = openChildModal;
  bar.appendChild(addBtn);
}

function renderDateStrip() {
  var strip = document.getElementById('dateStrip');
  strip.innerHTML = '';
  var today = new Date();
  var dayNames = ['일','월','화','수','목','금','토'];

  for (var offset = -7; offset <= 7; offset++) {
    var d = new Date(today);
    d.setDate(today.getDate() + offset);
    var ds = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    var isToday = (ds === todayStr());
    var isSelected = (ds === selectedDate);

    var dayTasks = getDayTasks(activeChildId, ds);
    var allDone = dayTasks.length > 0 && dayTasks.every(function(t){ return t.completed; });

    var item = document.createElement('div');
    item.className = 'date-item' +
      (isToday ? ' today' : '') +
      (isSelected ? ' selected' : '') +
      (allDone ? ' has-completed' : '');
    item.innerHTML =
      '<div class="day-name">' + dayNames[d.getDay()] + '</div>' +
      '<div class="day-num">' + d.getDate() + '</div>';
    item.onclick = (function(date) {
      return function() { selectedDate = date; renderAll(); };
    })(ds);
    strip.appendChild(item);
  }
  // 선택된 날짜로 스크롤
  setTimeout(function() {
    var sel = strip.querySelector('.selected');
    if (sel) sel.scrollIntoView({ inline: 'center', behavior: 'smooth' });
  }, 50);
}

function renderSummary() {
  var child = children.find(function(c){ return c.id === activeChildId; });
  if (!child) return;
  var dayTasks = getDayTasks(activeChildId, selectedDate);
  var done = dayTasks.filter(function(t){ return t.completed; }).length;
  var total = dayTasks.length;
  var earnedToday = 0;
  dayTasks.forEach(function(dt) {
    if (dt.completed) {
      var task = child.tasks.find(function(t){ return t.id === dt.taskId; });
      if (task) earnedToday += task.gameMinutes;
    }
  });

  var area = document.getElementById('todaySummary');
  area.innerHTML =
    '<div class="summary-card done"><div class="num">' + done + '/' + total + '</div><div class="label">완료</div></div>' +
    '<div class="summary-card remain"><div class="num">' + (total - done) + '</div><div class="label">남은 할일</div></div>' +
    '<div class="summary-card earned"><div class="num">' + earnedToday + '분</div><div class="label">획득 게임시간</div></div>';

  var label = document.getElementById('sectionDateLabel');
  if (selectedDate === todayStr()) {
    label.textContent = '📋 오늘의 할일';
  } else {
    label.textContent = '📋 ' + formatDate(selectedDate) + ' 할일';
  }
}

function renderTaskList() {
  var child = children.find(function(c){ return c.id === activeChildId; });
  if (!child) return;
  var area = document.getElementById('taskList');
  area.innerHTML = '';

  if (!child.tasks.length) {
    area.innerHTML = '<div class="task-empty">등록된 할일이 없어요.<br>할일 관리에서 추가해보세요!</div>';
    return;
  }

  var dayTasks = getDayTasks(activeChildId, selectedDate);
  child.tasks.forEach(function(task) {
    var hist = dayTasks.find(function(h){ return h.taskId === task.id; });
    var done = hist ? hist.completed : false;

    var card = document.createElement('div');
    card.className = 'task-card' + (done ? ' completed' : '');
    card.innerHTML =
      '<div class="task-check">' + (done ? '✓' : '') + '</div>' +
      '<div class="task-info">' +
        '<div class="task-name">' + task.name + '</div>' +
        '<div class="task-reward">🎮 완료 시 ' + task.gameMinutes + '분</div>' +
      '</div>' +
      '<div class="task-time-badge">' + (done ? '완료!' : task.gameMinutes + '분') + '</div>';
    card.onclick = function() { toggleTask(task.id); };
    area.appendChild(card);
  });
}

var lastNewTicket = -1;
function renderTickets() {
  var child = children.find(function(c){ return c.id === activeChildId; });
  if (!child) return;
  if (!child.rewards) child.rewards = [];
  var section = document.getElementById('ticketsSection');
  section.style.display = 'block';

  var body = document.getElementById('ticketsBody');
  body.innerHTML = '';

  if (!child.rewards.length) {
    body.innerHTML = '<div class="tickets-empty">아직 사용권이 없어요. 할일을 완료해서 게임시간을 모아보세요!</div>';
    return;
  }

  child.rewards.forEach(function(r, i) {
    var isNew = (i === child.rewards.length - 1 && i === lastNewTicket);
    var div = document.createElement('div');
    div.className = 'ticket' + (r.used ? ' used' : '') + (isNew ? ' ticket-pop' : '');
    var dateInfo = r.date + (r.taskName ? ' | ' + r.taskName : '');
    div.innerHTML =
      '<div class="ticket-icon">🎮</div>' +
      '<div class="ticket-info">' +
        '<div class="ticket-value">' + r.value + '분 게임시간</div>' +
        '<div class="ticket-date">' + dateInfo + '</div>' +
        (r.used && r.usedDate ? '<div class="ticket-date" style="color:#00b06f">사용: ' + r.usedDate + '</div>' : '') +
      '</div>' +
      '<div class="ticket-actions">' +
        (!r.used ?
          '<button class="ticket-btn use" onclick="event.stopPropagation();useTicket(' + i + ')">사용하기</button>' :
          '<span class="ticket-btn used-label">사용됨</span>') +
        '<button class="ticket-btn del" onclick="event.stopPropagation();deleteTicket(' + i + ')">✕</button>' +
      '</div>';
    body.appendChild(div);
  });
  lastNewTicket = -1;
}

/* ── 모달 바깥 터치 닫기 ── */
document.getElementById('childModalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeChildModal();
});
document.getElementById('taskModalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeTaskModal();
});

/* ── 초기화 ── */
(async function init() {
  var loaded = await loadFromFirestore();
  if (!loaded) loadLocal();
  if (children.length) activeChildId = children[0].id;
  selectedDate = todayStr();
  renderAll();
})();
</script>
</body>
</html>
